<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#2B2420"/>
  <rect width="512" height="512" rx="96" fill="url(#bg)" opacity="0.6"/>
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#C99A3E" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2B2420" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Scale beam -->
  <rect x="228" y="140" width="56" height="12" rx="6" fill="#E8B84B"/>
  <!-- Pivot -->
  <rect x="248" y="148" width="16" height="180" rx="8" fill="#C99A3E"/>
  <!-- Left pan chain -->
  <line x1="228" y1="152" x2="148" y2="260" stroke="#C99A3E" stroke-width="7" stroke-linecap="round"/>
  <!-- Right pan chain -->
  <line x1="284" y1="152" x2="364" y2="260" stroke="#C99A3E" stroke-width="7" stroke-linecap="round"/>
  <!-- Left pan -->
  <ellipse cx="148" cy="278" rx="52" ry="14" fill="#E8B84B"/>
  <!-- Right pan -->
  <ellipse cx="364" cy="278" rx="52" ry="14" fill="#E8B84B"/>
  <!-- Base -->
  <rect x="216" y="324" width="80" height="14" rx="7" fill="#C99A3E"/>
  <rect x="196" y="336" width="120" height="12" rx="6" fill="#A07830"/>
</svg>
