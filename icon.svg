<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
<defs>
  <radialGradient id="bgB" cx="50%" cy="30%" r="85%">
    <stop offset="0%"   stop-color="#2A211A"/>
    <stop offset="55%"  stop-color="#161009"/>
    <stop offset="100%" stop-color="#0A0705"/>
  </radialGradient>
  <!-- userSpaceOnUse é obrigatório: a haste do cifrão é uma linha vertical, de
       bounding box com largura ZERO. Com objectBoundingBox (o padrão) o gradiente
       degenera e o navegador não pinta a haste — o ícone vira um "S". -->
  <linearGradient id="grB" gradientUnits="userSpaceOnUse" x1="256" y1="132" x2="256" y2="356">
    <stop offset="0%"   stop-color="#E4DED2"/>
    <stop offset="55%"  stop-color="#A8A197"/>
    <stop offset="100%" stop-color="#6E6860"/>
  </linearGradient>
</defs>
<rect width="512" height="512" rx="114" fill="url(#bgB)"/>
<!-- Anel técnico fino -->
<circle cx="256" cy="256" r="186" fill="none" stroke="#4A443C" stroke-width="3"/>
<!-- Marcas de eixo — precisão instrumental, não ornamento -->
<g stroke="#4A443C" stroke-width="4" stroke-linecap="round">
  <path d="M256 46 L256 74"/><path d="M256 438 L256 466"/>
  <path d="M46 256 L74 256"/><path d="M438 256 L466 256"/>
</g>
<!-- Cifrão geométrico monoline: S de Bezier + haste, sem serifa -->
<g stroke="url(#grB)" stroke-width="19" stroke-linecap="round" fill="none">
  <path d="M306 196 C306 172 284 158 256 158 C228 158 206 172 206 196
           C206 220 228 232 256 240 C284 248 306 260 306 288
           C306 316 284 330 256 330 C228 330 206 316 206 292"/>
  <path d="M256 132 L256 356"/>
</g>
</svg>
